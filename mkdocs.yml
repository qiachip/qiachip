# ------------------------------
# 版本管理配置（Version Management Configuration）
# ------------------------------
# 使用mike插件进行版本管理
# Using mike plugin for version management
extra:
  version:
    provider: mike
    default: latest
  # 启用版本选择器
  # Enable version selector
  versions:
    - 1.0.0
    - 2.0.0


